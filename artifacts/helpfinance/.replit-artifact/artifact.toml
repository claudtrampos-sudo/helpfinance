kind = "web"
previewPath = "/"
title = "HelpFinance"
version = "1.0.0"
id = "artifacts/helpfinance"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25895

[services.development]
run = "pnpm --filter @workspace/helpfinance run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/helpfinance", "run", "build" ]
publicDir = "artifacts/helpfinance/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25895"
BASE_PATH = "/"
